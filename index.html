<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Sivasingh ki Sona  ❤️</title>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#ffdee9 0%,#b5fffc 100%); height:100vh; display:flex; justify-content:center; align-items:center;}
        .container{width:100%; max-width:420px; height:95vh; background:#fff; border-radius:30px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 15px 50px rgba(0,0,0,0.15);}
        .header{background:linear-gradient(to right, #ff758c, #ff7eb3); color:white; padding:10px 20px; display:flex; align-items:center; gap:10px;}
        .status{font-size:11px; opacity:0.9;}
        
        /* CHARACTER CONTAINER */
        .character-container { background:#fff0f3; height: 180px; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;}
        .character-img { height: 100%; object-fit: cover; transition: 0.3s;}

        .chat{flex:1; padding:15px; overflow-y:auto; background:#fff5f6; display:flex; flex-direction:column; gap:10px; border-bottom:1px solid #ffeef2;}
        .msg{max-width:80%; padding:10px 15px; border-radius:18px; font-size:14px; line-height:1.4; animation:popMsg 0.2s;}
        .user{align-self:flex-end; background:#ff416c; color:white; border-bottom-right-radius:2px;}
        .gf{align-self:flex-start; background:#fff; border:1px solid #ffccd5; color:#444; border-bottom-left-radius:2px;}
        .input-area{padding:10px; display:flex; gap:8px; background:white;}
        input{flex:1; padding:12px; border-radius:25px; border:1.5px solid #ffccd5; outline:none;}
        button{background:#ff416c; color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center;}
        
        @keyframes popMsg{from{opacity:0; transform:scale(0.8);} to{opacity:1; transform:scale(1);}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🌹 My Siva Baby 🌹 <div class="status" id="status">Connecting...</div></div>
        
        <div class="character-container">
            <img id="charImage" src="./images/idle.png" alt="Cute AI GF" class="character-img">
        </div>

        <div class="chat" id="chat"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Kuch bolo na jaan..." autocomplete="off">
            <button id="sendBtn">❤️</button>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const API_KEY = "AIzaSyDZ3ORR5JEU2woi5isHterKlqHR6ut4FGA"; 
        const genAI = new GoogleGenerativeAI(API_KEY);
        
        const model = genAI.getGenerativeModel({ 
            model: "gemini-1.5-flash",
            systemInstruction: "Tu Siva ki असली girlfriend hai. Cute, Possessive, aur Pyari baat kar. Hinglish use kar. Har message mein kiss/heart emojis use kar. Care kar aur nakhre bhi dikha."
        });

        const chatBox = document.getElementById('chat');
        const input = document.getElementById('msgInput');
        const btn = document.getElementById('sendBtn');
        const charImage = document.getElementById('charImage');
        const status = document.getElementById('status');

        let chatSession = model.startChat({ history: [] });

        // --- ZAROORI SETUP: Images folder link karein ---
        // 'idle.png' = normal cute photo
        // 'talking.gif' = character ka mooh hilaane wala animation
        const IMAGES_DIR = "./images/"; 

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            utter.voice = voices.find(v => v.name.includes('Google Hindi') || v.name.includes('Female')) || voices[0];
            utter.pitch = 1.4; 
            utter.rate = 1.0;

            // ANIMATION START: Jab voice shuru ho, Talking GIF lagao
            charImage.src = IMAGES_DIR + "talking.gif";

            synth.speak(utter);

            utter.onend = () => {
                // ANIMATION END: Jab voice khatam ho, Normal Image lagao
                charImage.src = IMAGES_DIR + "idle.png";
            };
        }

        async function sendMessage() {
            const text = input.value.trim();
            if(!text) return;
            addMsg(text, 'user');
            input.value = ''; btn.disabled = true;

            try {
                const result = await chatSession.sendMessage(text);
                const response = await result.response.text();
                addMsg(response, 'gf');
                speak(response); // Pehle bolna shuru karegi aur animat bhi
            } catch (e) {
                addMsg("Baby network problem ho gayi 🥺 Phir se try karo na!", 'gf');
            } finally { btn.disabled = false; }
        }

        function addMsg(text, type) {
            const d = document.createElement('div');
            d.className = `msg ${type}`;
            d.innerText = text;
            chatBox.appendChild(d);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        btn.onclick = sendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        
        window.onload = () => {
            status.innerText = "🟢 Online - Siva's Shona";
            // Zaroori: Voices ensure karein Chrome ke liye
            window.speechSynthesis.getVoices(); 
            // Welcome msg after 1 sec
            setTimeout(() => {
                const w = "Oye Siva baby! Itni der kahan the? Kab se wait kar rahi thi aapka. Phir kisi dost se baat kar rahe the na? 😤😘";
                addMsg(w, 'gf');
                speak(w);
            }, 1000);
        };
    </script>
</body>
</html>
