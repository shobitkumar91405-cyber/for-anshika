<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ludo Love ❤️ | MODDER SIVASINGH</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body{
background:#0a0506;
color:white;
text-align:center;
font-family:sans-serif;
}

h1{
color:#ff4d6d;
text-shadow:0 0 20px #ff4d6d;
}

#board{
display:grid;
grid-template-columns:repeat(15,24px);
gap:2px;
margin:20px auto;
}

.cell{
width:24px;height:24px;
background:#222;
border-radius:4px;
}

.safe{background:white;}

.token{
width:16px;height:16px;
border-radius:50%;
margin:auto;
}

.red{background:red;}
.blue{background:#4dabf7;}

button{
padding:10px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
margin:5px;
}

.controls{
position:fixed;
bottom:20px;
width:100%;
}

</style>
</head>

<body>

<h1>🎲 Ludo Love ❤️</h1>
<div>MODDER SIVASINGH 💖</div>

<input id="room" placeholder="Room Code">
<button onclick="join()">Join</button>

<div id="board"></div>

<button onclick="rollDice()">🎲 Roll Dice</button>
<div id="dice">0</div>

<div class="controls">
<button onclick="toggleMic()">🎤</button>
<button onclick="sendGift()">🎁</button>
<button onclick="toggleMusic()">🎵</button>
</div>

<audio id="music" src="love.mp3" loop></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

/* 🔥 SAME FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyCB-631vxXfLP-Cnnc3jTf7zz_kha8g8qk",
authDomain: "tic-tac-9253e.firebaseapp.com",
databaseURL: "https://tic-tac-9253e-default-rtdb.firebaseio.com",
projectId: "tic-tac-9253e",
storageBucket: "tic-tac-9253e.appspot.com",
messagingSenderId: "354573092432",
appId: "1:354573092432:web:d8f8672b220a80b6fe3355"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* 🎲 GAME STATE */
let roomId,myColor;
let diceVal=0;

const path=[91,92,93,94,95,80,65,50,35,20,21,22,23,24,25,
40,55,70,85,100,115,116,117,118,119,134,
149,164,179,194,193,192,191,190,189,
174,159,144,129,114,99,84,83,82,81];

const safe=[91,25,134,189];

let players={
red:{pos:[-1,-1,-1,-1]},
blue:{pos:[-1,-1,-1,-1]}
};

let turn="red";

/* 🎯 BOARD */
const board=document.getElementById("board");

for(let i=0;i<225;i++){
let d=document.createElement("div");
d.className="cell";
board.appendChild(d);
}

/* 🔗 JOIN */
window.join=async ()=>{
roomId=document.getElementById("room").value;

const snap=await get(ref(db,"rooms/"+roomId));

if(!snap.exists()){
myColor="red";
await set(ref(db,"rooms/"+roomId),{
players,turn,dice:0,gift:""
});
}else{
myColor="blue";
}

sync();
initVoice();
};

/* 🔄 SYNC */
function sync(){
onValue(ref(db,"rooms/"+roomId),(snap)=>{
const data=snap.val();
if(!data)return;

players=data.players;
turn=data.turn;
diceVal=data.dice;

render();

if(data.gift){
alert("Gift ❤️ received");
}
});
}

/* 🎲 DICE */
window.rollDice=async ()=>{
if(turn!==myColor)return;

diceVal=Math.floor(Math.random()*6)+1;
document.getElementById("dice").innerText=diceVal;

move(0);

await update(ref(db,"rooms/"+roomId),{
players,
turn:turn==="red"?"blue":"red",
dice:diceVal
});
};

/* 🚶 MOVE */
function move(i){
let p=players[myColor];

if(p.pos[i]===-1 && diceVal===6){
p.pos[i]=0;
return;
}

if(p.pos[i]>=0){
p.pos[i]+=diceVal;

if(p.pos[i]>=path.length){
alert("YOU WIN ❤️");
reset();
}
}

kill();
}

/* 💥 KILL */
function kill(){
let enemy=myColor==="red"?"blue":"red";

players[myColor].pos.forEach(pos=>{
players[enemy].pos.forEach((epos,i)=>{
if(path[pos]===path[epos] && !safe.includes(path[pos])){
players[enemy].pos[i]=-1;
alert("Killed 😈");
}
});
});
}

/* 🔁 RESET */
function reset(){
players.red.pos=[-1,-1,-1,-1];
players.blue.pos=[-1,-1,-1,-1];
}

/* 🎨 RENDER */
function render(){
document.querySelectorAll(".cell").forEach(c=>c.innerHTML="");

for(let p in players){
players[p].pos.forEach(pos=>{
if(pos>=0){
let cell=board.children[path[pos]];
let t=document.createElement("div");
t.className="token "+p;
cell.appendChild(t);
}
});
}
}

/* 🎤 VOICE */
let peer,stream;

function initVoice(){
peer=new Peer(roomId+"_"+myColor);

peer.on("call",call=>{
navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
call.answer(s);
call.on("stream",play);
});
});
}

window.toggleMic=async ()=>{
if(!stream){
stream=await navigator.mediaDevices.getUserMedia({audio:true});
let other=myColor==="red"?"blue":"red";
let call=peer.call(roomId+"_"+other,stream);
call.on("stream",play);
}
};

function play(s){
let a=document.createElement("audio");
a.srcObject=s;
a.play();
}

/* 🎁 GIFT */
window.sendGift=()=>{
update(ref(db,"rooms/"+roomId),{gift:"❤️"});
};

/* 🎵 MUSIC */
window.toggleMusic=()=>{
let m=document.getElementById("music");
m.paused?m.play():m.pause();
};

</script>
</body>
</html>
